name: Build APK and Create Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON secret — using stub config"
            cat > app/google-services.json << 'EOT'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mock-project-id",
              "storage_bucket": "mock-project-id.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000001",
                  "android_client_info": {
                    "package_name": "com.openclaw.assistant"
                  }
                },
                "api_key": [{ "current_key": "mock-api-key" }],
                "services": { "analytics_service": { "status": 1 }, "appinvite_service": { "status": 1, "other_platform_oauth_client": [] }, "ads_service": { "status": 2 } }
              }
            ],
            "configuration_version": "1"
          }
          EOT
          fi

      - name: Setup signing
        id: signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
            echo "storeFile=release.keystore" >> local.properties
            echo "storePassword=$STORE_PASSWORD" >> local.properties
            echo "keyAlias=$KEY_ALIAS" >> local.properties
            echo "keyPassword=$KEY_PASSWORD" >> local.properties
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "No signing secrets — will build debug APK"
          fi

      - name: Build Release
        if: steps.signing.outputs.has_signing == 'true'
        run: ./gradlew assembleRelease bundleRelease

      - name: Build Debug (no signing secrets)
        if: steps.signing.outputs.has_signing != 'true'
        run: ./gradlew assembleDebug

      - name: Get commit message
        id: commit
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename Artifacts
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.has_signing == 'true'
        run: |
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/OpenClawAssistant-${{ github.ref_name }}.apk
          mv app/build/outputs/bundle/release/*.aab app/build/outputs/bundle/release/OpenClawAssistant-${{ github.ref_name }}.aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.has_signing == 'true'
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/OpenClawAssistant-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/OpenClawAssistant-${{ github.ref_name }}.aab
          draft: false
          prerelease: false

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        if: steps.signing.outputs.has_signing == 'true' && !startsWith(github.ref, 'refs/tags/')
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: steps.signing.outputs.has_signing != 'true'
        with:
          name: debug-artifacts
          path: app/build/outputs/apk/debug/*.apk
